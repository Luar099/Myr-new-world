function renderMasterStorage(container){
  if(!DB.storage)DB.storage=[];
  const categories=["mapas","npcs","criaturas","players","objetos","outros"];
  container.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="secTitle" style="margin-bottom:0">Storage de Imagens</div>
      <button id="btnUploadImg">+ Upload</button>
    </div>
    <div class="muted mini" style="margin-bottom:10px">Armazene todas as imagens da campanha: mapas, criaturas, NPCs, arte de personagem. Salvas no navegador.</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px" id="storageFilters">
      <button class="hubTab active" data-scat="all">Todos</button>
      ${categories.map(c=>`<button class="hubTab" data-scat="${c}">${c.charAt(0).toUpperCase()+c.slice(1)}</button>`).join("")}
    </div>
    <div id="storageGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px"></div>
  `;
  let activeCat="all";
  function renderStorageGrid(){
    const el=$('storageGrid');if(!el)return;
    const filtered=DB.storage.filter(s=>activeCat==="all"||s.category===activeCat);
    if(!filtered.length){el.innerHTML=`<div style="grid-column:1/-1;border:1px dashed rgba(180,140,60,.2);border-radius:2px;padding:20px;text-align:center"><span class="muted mini">Sem imagens nesta categoria.</span></div>`;return;}
    el.innerHTML=filtered.map(img=>`
      <div style="border:1px solid rgba(180,140,60,.18);border-radius:2px;overflow:hidden;background:rgba(6,4,2,.6);transition:border-color .18s" onmouseover="this.style.borderColor='rgba(200,149,42,.4)'" onmouseout="this.style.borderColor='rgba(180,140,60,.18)'">
        <div style="height:140px;overflow:hidden;cursor:pointer" onclick="openStorageView('${img.id}')">
          <img src="${img.dataUrl}" style="width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        </div>
        <div style="padding:7px">
          <div style="font-size:11px;font-family:'Cinzel',serif;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHTML(img.name)}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
            <span class="tag" style="font-size:9px">${img.category||"outros"}</span>
            <button class="danger mini" style="padding:2px 6px" onclick="deleteStorageImg('${img.id}')">✕</button>
          </div>
        </div>
      </div>
    `).join("");
  }
  container.querySelectorAll("[data-scat]").forEach(btn=>btn.onclick=()=>{
    activeCat=btn.dataset.scat;
    container.querySelectorAll("[data-scat]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");renderStorageGrid();
  });
  $('btnUploadImg').onclick=()=>{
    const {overlay,m}=modal("storageUpModal",`
      <div class="modalHeader">
        <b class="secTitle">Upload de Imagem</b>
        <button class="danger mini" onclick="document.getElementById('storageUpModal').remove()">✕</button>
      </div>
      <div style="display:grid;gap:8px">
        <div><label>Nome</label><input id="su_name" placeholder="ex: Mapa da Floresta Negra"></div>
        <div><label>Categoria</label><select id="su_cat">${categories.map(c=>`<option value="${c}">${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join("")}</select></div>
        <div>
          <label>Arquivo(s) de imagem (pode selecionar vários)</label>
          <input id="su_files" type="file" accept="image/*" multiple>
        </div>
        <div id="su_preview" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;min-height:40px"></div>
        <button class="success" id="su_save">💾 Salvar no Storage</button>
      </div>
    `);
    const inp=m.querySelector("#su_files");
    const prevEl=m.querySelector("#su_preview");
    inp.onchange=async()=>{
      prevEl.innerHTML="";
      for(const f of inp.files){const url=await fileToDataURL(f);prevEl.innerHTML+=`<img src="${url}" style="width:100%;height:80px;object-fit:cover;border-radius:2px;border:1px solid rgba(180,140,60,.2)">`;}
    };
    m.querySelector("#su_save").onclick=async()=>{
      const nm=m.querySelector("#su_name").value.trim()||"sem nome";
      const cat=m.querySelector("#su_cat").value;
      if(!inp.files.length){toast("Selecione ao menos uma imagem.",false);return;}
      DB=loadDB();if(!DB.storage)DB.storage=[];
      for(let i=0;i<inp.files.length;i++){
        const url=await fileToDataURL(inp.files[i]);
        DB.storage.push({id:"st_"+Math.random().toString(16).slice(2,8),name:inp.files.length>1?`${nm} (${i+1})`:nm,category:cat,dataUrl:url,ts:Date.now()});
      }
      saveDB(DB);overlay.remove();renderStorageGrid();toast(`📦 ${inp.files.length} imagem(ns) salva(s)!`,true);
    };
  };
  renderStorageGrid();
}

function openStorageView(id){
  DB=loadDB();const img=(DB.storage||[]).find(s=>s.id===id);if(!img)return;
  modal("stViewModal",`
    <div class="modalHeader" style="margin-bottom:10px">
      <b class="secTitle">${escapeHTML(img.name)}</b>
      <div style="display:flex;gap:6px">
        <a href="${img.dataUrl}" download="${img.name||'imagem'}" style="text-decoration:none"><button class="secondary mini">⬇ Download</button></a>
        <button class="danger mini" onclick="document.getElementById('stViewModal').remove()">✕</button>
      </div>
    </div>
    <div style="text-align:center"><img src="${img.dataUrl}" style="max-width:100%;max-height:75vh;object-fit:contain;border-radius:2px"></div>
  `);
}
function deleteStorageImg(id){if(!confirm("Remover imagem?"))return;DB=loadDB();DB.storage=(DB.storage||[]).filter(s=>s.id!==id);saveDB(DB);setMasterTab("mStorage");}

/* ════════════════════════════════════════════════════
   LIVRO DE SKILLS DO MESTRE
   Permite criar skills organizadas por escola/tipo
   que o Mestre usa como referência para a campanha
════════════════════════════════════════════════════ */

const SKILL_SCHOOLS = ["Combate","Magia","Furtividade","Sobrevivência","Social","Arcano","Divino","Sombrio","Elemental","Físico","Mental","Especial"];
const SKILL_TYPES_BOOK = ["Passiva","Ativa","Reação","Ultimate","Racial","Maldição","Bênção","Ritual"];
const SKILL_COSTS = ["Gratuito","1 Mana","2 Mana","3 Mana","5 Mana","10 Mana","Ação Bônus","Ação Completa","Ritual"];

function renderMasterSkillBook(container){
  if(!DB.skillBook)DB.skillBook=[];
  const skills=DB.skillBook;
  container.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div class="secTitle" style="margin-bottom:0">📜 Livro de Skills</div>
      <div style="display:flex;gap:6px">
        <button id="btnNewSkill">+ Nova Skill</button>
        <button class="secondary mini" id="btnExportSkills">⬇ Exportar</button>
        <button class="secondary mini" id="btnImportSkills">⬆ Importar</button>
      </div>
    </div>
    <div class="muted mini" style="margin-bottom:12px">Crie e organize todas as skills disponíveis na campanha. Players podem aprender via Árvore de Skills.</div>
    <!-- Filtros -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
      <div><label>Buscar</label><input id="sk_search" placeholder="Nome, descrição..."></div>
      <div><label>Escola</label><select id="sk_filterSchool"><option value="">Todas as escolas</option>${SKILL_SCHOOLS.map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div>
      <div><label>Tipo</label><select id="sk_filterType"><option value="">Todos os tipos</option>${SKILL_TYPES_BOOK.map(t=>`<option value="${t}">${t}</option>`).join("")}</select></div>
    </div>
    <!-- Estatísticas -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;margin-bottom:12px" id="skillStats"></div>
    <!-- Lista de skills -->
    <div id="skillBookList" style="display:grid;gap:8px"></div>
  `;

  function getStats(){
    const el=document.getElementById("skillStats");if(!el)return;
    const schools={};SKILL_SCHOOLS.forEach(s=>schools[s]=0);
    skills.forEach(sk=>{ if(schools[sk.school]!==undefined)schools[sk.school]++; });
    const sorted=Object.entries(schools).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,6);
    el.innerHTML=sorted.map(([s,c])=>`<div style="background:rgba(5,3,1,.6);border:1px solid rgba(180,140,60,.16);border-radius:2px;padding:8px;text-align:center"><div class="muted mini" style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px">${s.toUpperCase()}</div><div style="font-weight:700;font-family:'Cinzel',serif;font-size:18px;color:var(--goldL)">${c}</div></div>`).join("")||`<div class="muted mini">Sem skills ainda.</div>`;
  }

  function renderSkillList(){
    const el=document.getElementById("skillBookList");if(!el)return;
    const q=(document.getElementById("sk_search")?.value||"").toLowerCase();
    const school=document.getElementById("sk_filterSchool")?.value||"";
    const type=document.getElementById("sk_filterType")?.value||"";
    let filtered=skills.filter(sk=>{
      const matchQ=!q||(sk.name||"").toLowerCase().includes(q)||(sk.description||"").toLowerCase().includes(q);
      const matchS=!school||sk.school===school;
      const matchT=!type||sk.type===type;
      return matchQ&&matchS&&matchT;
    });
    if(!filtered.length){el.innerHTML=`<div style="border:1px dashed rgba(180,140,60,.2);border-radius:2px;padding:30px;text-align:center"><span class="muted mini">Nenhuma skill encontrada. Clique em "+ Nova Skill" para criar!</span></div>`;return;}

    // Agrupa por escola
    const groups={};
    filtered.forEach(sk=>{const sch=sk.school||"Especial";if(!groups[sch])groups[sch]=[];groups[sch].push(sk);});

    el.innerHTML=Object.entries(groups).map(([school,sklist])=>`
      <div style="border:1px solid rgba(180,140,60,.2);border-radius:2px;overflow:hidden;margin-bottom:4px">
        <div style="background:linear-gradient(90deg,rgba(20,12,6,.9),rgba(14,9,4,.9));padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(180,140,60,.15)">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:16px">${getSchoolIcon(school)}</span>
            <b style="font-family:'Cinzel',serif;font-size:13px;color:var(--goldL);letter-spacing:1px">${school.toUpperCase()}</b>
          </div>
          <span class="pill">${sklist.length} skill${sklist.length>1?"s":""}</span>
        </div>
        <div style="padding:8px;display:grid;gap:6px">
          ${sklist.map(sk=>{
            const typeCol={Passiva:"var(--muted)",Ativa:"var(--goldL)",Reação:"#3498db",Ultimate:"#c090e8",Racial:"var(--ok)",Maldição:"var(--bad)",Bênção:"#5de87a",Ritual:"#ffaa55"}[sk.type]||"var(--muted)";
            return`<div style="border:1px solid rgba(180,140,60,.14);border-radius:2px;padding:11px;background:rgba(7,5,2,.55);transition:border-color .18s" onmouseover="this.style.borderColor='rgba(200,149,42,.35)'" onmouseout="this.style.borderColor='rgba(180,140,60,.14)'">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
                <div style="flex:1;min-width:180px">
                  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                    <b style="font-family:'Cinzel',serif;font-size:14px;color:var(--ink)">${escapeHTML(sk.name)}</b>
                    <span class="tag" style="color:${typeCol};border-color:${typeCol}40;font-size:9px">${sk.type||"Passiva"}</span>
                    ${sk.cost?`<span class="tag" style="font-size:9px">💎 ${escapeHTML(sk.cost)}</span>`:""}
                    ${sk.reqLevel?`<span class="tag" style="font-size:9px">Nível ${sk.reqLevel}+</span>`:""}
                    ${sk.prereq?`<span class="tag" style="font-size:9px">→ ${escapeHTML(sk.prereq)}</span>`:""}
                  </div>
                  <div style="font-size:13px;color:var(--ink);margin-top:5px;line-height:1.5">${escapeHTML(sk.description||"")}</div>
                  ${sk.effect?`<div style="margin-top:5px;padding:6px 8px;background:rgba(200,149,42,.07);border:1px solid rgba(200,149,42,.2);border-radius:2px"><div class="muted mini" style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px;margin-bottom:2px">EFEITO MECÂNICO</div><div style="font-size:12px;color:var(--goldL)">${escapeHTML(sk.effect)}</div></div>`:""}
                  ${sk.masterNote?`<div style="margin-top:5px;padding:6px 8px;background:rgba(139,26,26,.08);border:1px solid rgba(139,26,26,.25);border-radius:2px"><div class="muted mini" style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px;margin-bottom:2px">🔒 NOTA DO MESTRE</div><div style="font-size:12px;color:rgba(200,149,42,.7)">${escapeHTML(sk.masterNote)}</div></div>`:""}
                </div>
              </div>
              <div style="display:flex;gap:5px;margin-top:8px">
                <button class="secondary mini" onclick="openSkillBookModal('${sk.id}')">✏ Editar</button>
                <button class="danger mini" onclick="deleteSkillBook('${sk.id}')">✕</button>
                <button class="secondary mini" onclick="duplicateSkill('${sk.id}')">⧉ Duplicar</button>
              </div>
            </div>`;
          }).join("")}
        </div>
      </div>
    `).join("");
  }

  // Eventos de filtro
  document.getElementById("sk_search")?.addEventListener("input",renderSkillList);
  document.getElementById("sk_filterSchool")?.addEventListener("change",renderSkillList);
  document.getElementById("sk_filterType")?.addEventListener("change",renderSkillList);

  document.getElementById("btnNewSkill").onclick=()=>openSkillBookModal(null);
  document.getElementById("btnExportSkills").onclick=()=>{
    const j=JSON.stringify(DB.skillBook||[],null,2);
    try{navigator.clipboard.writeText(j);toast("📋 Copiado para clipboard!",true);}catch(_){}
    prompt("JSON do Livro de Skills (copie):",j);
  };
  document.getElementById("btnImportSkills").onclick=()=>{
    const j=prompt("Cole o JSON das skills:");
    if(!j)return;
    try{const arr=JSON.parse(j);if(!Array.isArray(arr))throw new Error();
      DB=loadDB();DB.skillBook=arr;saveDB(DB);
      toast(`📜 ${arr.length} skills importadas!`,true);setMasterTab("mSkills");
    }catch(_){toast("JSON inválido.",false);}
  };

  getStats();renderSkillList();
}

function getSchoolIcon(school){
  const icons={Combate:"⚔",Magia:"✨",Furtividade:"🌑",Sobrevivência:"🌿",Social:"💬",Arcano:"🔮",Divino:"☀",Sombrio:"💀",Elemental:"🌊",Físico:"💪",Mental:"🧠",Especial:"⭐"};
  return icons[school]||"📜";
}

function openSkillBookModal(id){
  DB=loadDB();if(!DB.skillBook)DB.skillBook=[];
  const existing=id?DB.skillBook.find(s=>s.id===id):null;
  const sk=existing||{
    id:"sk_"+Math.random().toString(16).slice(2,8),
    name:"",school:"Combate",type:"Passiva",cost:"Gratuito",
    reqLevel:1,prereq:"",description:"",effect:"",masterNote:""
  };
  const {overlay,m}=modal("skillBookModal",`
    <div class="modalHeader">
      <b class="secTitle">${existing?"Editar":"Nova"} Skill</b>
      <button class="danger mini" onclick="document.getElementById('skillBookModal').remove()">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div style="display:grid;gap:8px">
        <div><label>Nome da Skill</label><input id="sk_name" value="${escapeHTML(sk.name)}" placeholder="ex: Golpe Devastador, Chama Sagrada..."></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div><label>Escola</label><select id="sk_school">${SKILL_SCHOOLS.map(s=>`<option value="${s}" ${sk.school===s?"selected":""}>${getSchoolIcon(s)} ${s}</option>`).join("")}</select></div>
          <div><label>Tipo</label><select id="sk_type">${SKILL_TYPES_BOOK.map(t=>`<option value="${t}" ${sk.type===t?"selected":""}>${t}</option>`).join("")}</select></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div><label>Custo</label><select id="sk_cost">${SKILL_COSTS.map(c=>`<option value="${c}" ${sk.cost===c?"selected":""}>${c}</option>`).join("")}<option value="__custom">Personalizado...</option></select></div>
          <div><label>Nível Mínimo</label><input id="sk_lvl" type="number" value="${sk.reqLevel||1}" min="1" max="100"></div>
        </div>
        <div><label>Pré-requisito (nome de outra skill)</label><input id="sk_prereq" value="${escapeHTML(sk.prereq||"")}" placeholder="ex: Ataque Básico, Chama I..."></div>
        <div><label>Descrição (para o player)</label><textarea id="sk_desc" rows="4" placeholder="O que essa skill faz, como ela funciona narrativamente...">${escapeHTML(sk.description||"")}</textarea></div>
      </div>
      <div style="display:grid;gap:8px;align-content:start">
        <div>
          <label>Efeito Mecânico</label>
          <textarea id="sk_effect" rows="4" placeholder="+2d6 dano de fogo&#10;+10% velocidade&#10;Heal 1d8+WIL&#10;Imune a sangramento">${escapeHTML(sk.effect||"")}</textarea>
          <div class="muted mini" style="margin-top:3px">Use formato livre — dados, bônus, condições...</div>
        </div>
        <div>
          <label>🔒 Nota do Mestre (só você vê)</label>
          <textarea id="sk_masternote" rows="4" style="border-color:rgba(139,26,26,.3)" placeholder="Contexto, abuso possível, combinações com outras skills, lore secreto...">${escapeHTML(sk.masterNote||"")}</textarea>
        </div>
        <!-- Preview da skill -->
        <div style="border:1px solid rgba(180,140,60,.2);border-radius:2px;padding:12px;background:rgba(5,3,1,.6)">
          <div class="muted mini" style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px;margin-bottom:8px">PREVIEW</div>
          <div id="sk_preview" style="font-size:13px">Preencha os campos ao lado...</div>
        </div>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px">
      <button class="secondary" onclick="document.getElementById('skillBookModal').remove()">Cancelar</button>
      <button class="success" id="sk_save">💾 Salvar Skill</button>
    </div>
  `);

  // Live preview
  function updatePreview(){
    const nm=m.querySelector("#sk_name").value||"Nome da Skill";
    const tp=m.querySelector("#sk_type").value;
    const sc=m.querySelector("#sk_school").value;
    const ct=m.querySelector("#sk_cost").value;
    const desc=m.querySelector("#sk_desc").value||"Descrição...";
    const eff=m.querySelector("#sk_effect").value;
    const prev=m.querySelector("#sk_preview");
    const typeCol={Passiva:"var(--muted)",Ativa:"var(--goldL)",Reação:"#3498db",Ultimate:"#c090e8",Racial:"var(--ok)",Maldição:"var(--bad)",Bênção:"#5de87a",Ritual:"#ffaa55"}[tp]||"var(--muted)";
    prev.innerHTML=`
      <b style="font-family:'Cinzel',serif;font-size:14px;color:var(--ink)">${escapeHTML(nm)}</b>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">
        <span class="tag" style="color:${typeCol};border-color:${typeCol}40;font-size:9px">${tp}</span>
        <span class="tag" style="font-size:9px">${getSchoolIcon(sc)} ${sc}</span>
        ${ct&&ct!=="Gratuito"?`<span class="tag" style="font-size:9px">💎 ${escapeHTML(ct)}</span>`:""}
      </div>
      <div style="margin-top:6px;font-size:12px;color:var(--ink)">${escapeHTML(desc.slice(0,120))}${desc.length>120?"...":""}</div>
      ${eff?`<div style="margin-top:5px;font-size:11px;color:var(--goldL)">⚡ ${escapeHTML(eff.slice(0,80))}</div>`:""}
    `;
  }
  m.querySelectorAll("input,select,textarea").forEach(el=>el.addEventListener("input",updatePreview));
  updatePreview();

  m.querySelector("#sk_save").onclick=()=>{
    sk.name=m.querySelector("#sk_name").value.trim();
    if(!sk.name){toast("Nome obrigatório.",false);return;}
    sk.school=m.querySelector("#sk_school").value;
    sk.type=m.querySelector("#sk_type").value;
    sk.cost=m.querySelector("#sk_cost").value;
    sk.reqLevel=Number(m.querySelector("#sk_lvl").value)||1;
    sk.prereq=m.querySelector("#sk_prereq").value.trim();
    sk.description=m.querySelector("#sk_desc").value.trim();
    sk.effect=m.querySelector("#sk_effect").value.trim();
    sk.masterNote=m.querySelector("#sk_masternote").value.trim();
    DB=loadDB();if(!DB.skillBook)DB.skillBook=[];
    const idx=DB.skillBook.findIndex(x=>x.id===sk.id);
    if(idx>=0)DB.skillBook[idx]=sk;else DB.skillBook.push(sk);
    saveDB(DB);overlay.remove();setMasterTab("mSkills");toast("📜 Skill salva!",true);
  };
}

function deleteSkillBook(id){
  if(!confirm("Remover skill?"))return;
  DB=loadDB();DB.skillBook=(DB.skillBook||[]).filter(s=>s.id!==id);
  saveDB(DB);setMasterTab("mSkills");
}

function duplicateSkill(id){
  DB=loadDB();const sk=(DB.skillBook||[]).find(s=>s.id===id);
  if(!sk)return;
  const copy={...sk,id:"sk_"+Math.random().toString(16).slice(2,8),name:sk.name+" (cópia)"};
  DB.skillBook.push(copy);saveDB(DB);setMasterTab("mSkills");
  toast("⧉ Skill duplicada!",true);
}


/* ═══════════════════════════════════════════════════════════════
   LOJA — SISTEMA COMPLETO
   Master controla estoque + preços + ouro dos players
   Players compram, vendem, veem histórico de transações
═══════════════════════════════════════════════════════════════ */

/* ── Render da loja para o PLAYER ── */
function renderLojaPanel(pid){
  const el = document.getElementById("lojaContent");
  if(!el) return;
  DB = loadDB();
  const p = getPlayer(pid); if(!p) return;
  const shop = DB.masterShop || { items:[], enabled:true };
  const ouro = Number(p.character.ouro||0);

  if(!shop.enabled){

function playerBuyItem(pid, shopItemId){
  DB=loadDB();
  const p=getPlayer(pid);if(!p)return;
  const shop=DB.masterShop||{items:[]};
  const it=shop.items.find(i=>i.id===shopItemId);if(!it)return;
  const ouro=Number(p.character.ouro||0);
  const price=Number(it.price||0);
  if(ouro<price){toast("Ouro insuficiente!",false);return;}
  p.character.ouro=ouro-price;
  if(!p.inventory)p.inventory=[];
  p.inventory.unshift({
    id:"it_"+Math.random().toString(16).slice(2,8),
    shopId:it.id,
    name:it.name,rarity:it.rarity||"comum",
    qty:1,weight:it.weight||0.5,
    defesa:it.defesa||0,vida:it.vida||0,
    effect:it.effect||"",ts:Date.now()
  });
  if(it.stock!=null&&it.stock>0){it.stock--;} 
  if(!p.character.transacoes)p.character.transacoes=[];
  p.character.transacoes.unshift({ts:Date.now(),text:`Comprou: ${it.name} por 🪙${price}`});
  p.log.unshift({ts:Date.now(),text:`🛒 Comprou "${it.name}" por ${price} ouro`});
  saveDB(DB);
  toast(`🛒 ${it.name} comprado!`,true);
  renderLojaPanel(pid);
}

function playerSellItem(pid, shopItemId){
  DB=loadDB();
  const p=getPlayer(pid);if(!p)return;
  const shop=DB.masterShop||{items:[]};
  const it=shop.items.find(i=>i.id===shopItemId);if(!it||!it.sellPrice)return;
  const invIdx=(p.inventory||[]).findIndex(i=>i.shopId===shopItemId);
  if(invIdx<0){toast("Item não encontrado no inventário.",false);return;}
  p.character.ouro=(Number(p.character.ouro||0))+Number(it.sellPrice);
  p.inventory.splice(invIdx,1);
  if(!p.character.transacoes)p.character.transacoes=[];
  p.character.transacoes.unshift({ts:Date.now(),text:`Vendeu: ${it.name} por 🪙${it.sellPrice}`});
  saveDB(DB);
  toast(`💰 Vendido por ${it.sellPrice} ouro!`,true);
  renderLojaPanel(pid);
}

function toggleShop(){
  DB=loadDB();

  saveDB(DB);
  toast(`Loja ${DB.masterShop.enabled?'aberta':'fechada'}!`,DB.masterShop.enabled);
  setMasterTab("mLoja");
}

function masterGiveOuro(pid,amt,give){
  DB=loadDB();const p=getPlayer(pid);if(!p)return;
  const amount=Math.abs(Number(amt||0));
  if(!amount){toast("Quantidade inválida.",false);return;}
  p.character.ouro=Math.max(0,(Number(p.character.ouro||0))+(give?amount:-amount));
  if(!p.character.transacoes)p.character.transacoes=[];
  p.character.transacoes.unshift({ts:Date.now(),text:`Mestre ${give?'deu':'tirou'} 🪙${amount}`});
  p.log.unshift({ts:Date.now(),text:`🪙 Mestre ${give?'deu':'tirou'} ${amount} ouro. Total: ${p.character.ouro}`});
  saveDB(DB);
  toast(`${give?'🪙 Ouro dado!':'💸 Ouro removido!'}`,give);
  setMasterTab("mLoja");
}

function deleteShopItem(id){if(!confirm("Remover item da loja?"))return;DB=loadDB();DB.masterShop.items=(DB.masterShop.items||[]).filter(i=>i.id!==id);saveDB(DB);setMasterTab("mLoja");}

function getAlignLabel(v){
  if(v>=90)return"💛 Devoto — faria qualquer coisa por vocês";
  if(v>=70)return"💚 Aliado — confia e coopera plenamente";
  if(v>=55)return"🟡 Amigável — disposição positiva";
  if(v>=45)return"⚪ Neutro — indiferente";
  if(v>=30)return"🟠 Desconfiado — reservado";
  if(v>=15)return"🔴 Hostil — antagonista";
  return"💀 Inimigo Jurado — quer vê-los mortos";
}

// ── Firebase SDK + Realtime DB sync ──
// Este bloco é ativado quando MYR_USE_FIREBASE = true
// A IA de backend deve:
// 1. Criar projeto no Firebase Console
// 2. Ativar Realtime Database (modo teste ou com regras)
// 3. Copiar credenciais para MYR_FIREBASE_CONFIG acima
// 4. Setar MYR_USE_FIREBASE = true

let _fbApp = null;
let _fbDb  = null;
let _fbSyncTimeout = null;

async function initFirebase(){
  if(!MYR_USE_FIREBASE) return;
  try{
    // Carrega SDK do Firebase dinamicamente
    const { initializeApp }   = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getDatabase, ref, set, onValue, get } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
    _fbApp = initializeApp(MYR_FIREBASE_CONFIG);
    _fbDb  = getDatabase(_fbApp);

    // Escuta mudanças remotas e atualiza local
    const dbRef = ref(_fbDb, "myr_db");
    onValue(dbRef, snapshot=>{
      const remote = snapshot.val();
      if(!remote) return;
      // Só aplica se versão remota for mais nova
      if(remote._ts && remote._ts > (DB._ts||0)){
        DB = remote;
        localStorage.setItem(KEY, JSON.stringify(DB));
        render();
      }
    });

    console.log("✅ Firebase conectado!");
    toast("☁️ Sincronização Firebase ativa!",true);
  }catch(e){
    console.error("Firebase init error:", e);
    toast("⚠️ Firebase falhou — usando local.",false);
  }
}

// Sobrescreve saveDB para também salvar no Firebase quando ativo
const _localSaveDB = saveDB;

function saveDB(db){
  // ✅ primeiro executa o save original
  _localSaveDB(db);

  // ✅ depois manda pro Firebase (se ativo)
  if (typeof MYR_USE_FIREBASE !== "undefined" && MYR_USE_FIREBASE && _fbDb) {

    clearTimeout(_fbSyncTimeout);

    _fbSyncTimeout = setTimeout(async () => {
      try{
        const { ref, set } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");

        db._ts = Date.now();
        await set(ref(_fbDb,"myr_db"), db);

      }catch(e){
        console.warn("Firebase save error:", e);
      }
    }, 800);

  }
}

// Inicializa Firebase quando o site carrega
initFirebase();

function fileToDataURL(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});}

function getReputacaoLabel(v){
  if(v>=90) return "🌟 Lendário — todos te conhecem";
  if(v>=70) return "⭐ Respeitado — aliados leais";
  if(v>=50) return "⚖️ Neutro — faça suas escolhas";

/* ========================= BUFFS AREA ========================= */
function renderBuffsArea(player){
  const now = Date.now();
  const c = player.character;
  const conds = (c.conditions||[]).filter(cd=>!cd.expires||cd.expires>now);
  const buffs = (c.buffs||[]).filter(b=>!b.expires||b.expires>now);
  if(!conds.length && !buffs.length) return '<span class="muted mini" style="font-style:italic">Nenhum efeito ativo no momento.</span>';

  const condFxMap = {
    veneno:      {stat:"vida",    dmg:5,  heal:false, icon:"☠",  label:"Veneno"},
    sangramento: {stat:"vida",    dmg:8,  heal:false, icon:"🩸", label:"Sangramento"},
    queimando:   {stat:"vida",    dmg:10, heal:false, icon:"🔥", label:"Queimando"},
    amaldicoado: {stat:"vida",    dmg:4,  heal:false, icon:"🌑", label:"Amaldiçoado"},
    congelado:   {stat:"velocidade",dmg:3,heal:false, icon:"❄",  label:"Congelado"},
    regeneracao: {stat:"vida",    dmg:6,  heal:true,  icon:"💚", label:"Regeneração"},
    buff:        {stat:null,      dmg:0,  heal:true,  icon:"✨", label:"Buff"},
    medo:        {stat:null,      dmg:0,  heal:false, icon:"👻", label:"Medo"},
    atordoado:   {stat:null,      dmg:0,  heal:false, icon:"💫", label:"Atordoado"},
    paralisado:  {stat:null,      dmg:0,  heal:false, icon:"🧊", label:"Paralisado"},
  };

  const condHtml = conds.map(x=>{
    const fx = condFxMap[x.type||"atordoado"] || {icon:"⚠",label:x.type,dmg:0,heal:false};
    const isHarm = !fx.heal && fx.dmg > 0;
    const timeLeft = x.expires ? Math.max(0,Math.ceil((x.expires-now)/60000)) + " min" : "∞";
    const dmgLabel = fx.stat && fx.dmg ? `<span class="pill" style="font-size:9px;border-color:${isHarm?"rgba(192,57,43,.4)":"rgba(39,174,96,.4)"};color:${isHarm?"#ff9090":"#90ee90"}">${isHarm?"-":"+"}${fx.dmg} ${fx.stat} /6s</span>` : "";
    return `<div class="buffItem ${isHarm?"harm":"help"}">
      <div style="flex:1;min-width:0">
        <span class="condTag cond-${x.type||'atordoado'}">${fx.icon} ${escapeHTML(x.name)}</span>
        ${dmgLabel}
        ${x.desc?`<div class="muted mini" style="margin-top:3px">${escapeHTML(x.desc)}</div>`:""}
      </div>
      <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">
        <span class="pill" style="font-size:9px">⏱ ${timeLeft}</span>
        <button class="danger mini" data-action="rm_effect" data-eid="${escapeHTML(x.id||"")}">✕</button>
      </div>
    </div>`;
  }).join("");

  const buffHtml = buffs.map(x=>{
    const timeLeft = x.expires ? Math.max(0,Math.ceil((x.expires-now)/60000)) + " min" : "∞";
    const statLabel = x.stat && x.value ? `<span class="pill" style="font-size:9px;border-color:rgba(39,174,96,.4);color:#90ee90">+${x.value} ${x.stat}</span>` : "";
    return `<div class="buffItem help">
      <div style="flex:1;min-width:0">
        <span class="condTag cond-buff">✨ ${escapeHTML(x.name)}</span>
        ${statLabel}
        ${x.desc?`<div class="muted mini" style="margin-top:3px">${escapeHTML(x.desc)}</div>`:""}
      </div>
      <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">
        <span class="pill" style="font-size:9px">⏱ ${timeLeft}</span>
        <button class="danger mini" data-action="rm_effect" data-eid="${escapeHTML(x.id||"")}">✕</button>
      </div>
    </div>`;
  }).join("");

  return condHtml + buffHtml;
}

/* ========================= KPI ========================= */
function renderKpi(title, id, value, max, fillClass=""){
  const safeMax = Number.isFinite(Number(max)) ? Number(max) : 0;
  const safeVal = Number.isFinite(Number(value)) ? Number(value) : 0;
  const pct = safeMax>0 ? clamp(Math.round((safeVal/safeMax)*100),0,100) : 0;
  return `
    <div class="kpiBox">
      <div class="kpiTitle">
        <b>${title}</b>
        <span class="pill mini">Max: ${safeMax}</span>
      </div>
      <div class="row" style="justify-content:space-between;margin-top:6px">
        <div class="kpiValue" id="${id}Val">${safeVal}</div>
        <div class="row" style="gap:4px">
          <button type="button" class="secondary mini" data-stat="${id}" data-step="5">-5</button>
          <button type="button" class="secondary mini" data-stat="${id}" data-step="1">-1</button>
          <button type="button" class="secondary mini" data-stat="${id}" data-step="1">+1</button>
          <button type="button" class="secondary mini" data-stat="${id}" data-step="5">+5</button>
        </div>
      </div>
      <div class="kpiBar" title="${safeVal} / ${safeMax}">
        <div id="${id}Fill" class="${fillClass}" style="width:${pct}%"></div>
      </div>
    </div>
  `;
}

function updateKpiBars(){
  const map=[["vida","vidaFill"],["defesa","defesaFill"],["velocidade","velocidadeFill"],["mana","manaFill"]];
  const toNum=(t)=>{ const s=String(t??"").replace(/[^0-9.-]+/g,""); const n=Number(s); return Number.isFinite(n)?n:0; };
  for(const [key,fillCls] of map){
    const fill=document.getElementById(key+"Fill");
    const valEl=document.getElementById(key+"Val");
    if(!fill||!valEl) continue;
    const cur=toNum(valEl.textContent);
    const refText=fill.closest(".kpiBox")?.querySelector(".pill.mini")?.textContent||"";
    const ref=toNum(refText.replace("Max:",""));
    const pct=ref>0?Math.max(0,Math.min(100,(cur/ref)*100)):0;
    fill.style.width=pct.toFixed(2)+"%";
  }
}

function formatBuffs(buffs){
  if(!buffs) return "";
  const parts=[];
  if(buffs.attr){ for(const [k,v] of Object.entries(buffs.attr)){ const lbl=ATTR_LABEL[k]||k; if(v) parts.push(`• ${lbl} ${v>0?"+":""}${v}`); } }
  if(buffs.skill){ for(const [k,v] of Object.entries(buffs.skill)){ const lbl=SKILL_LABEL[k]||k; if(v) parts.push(`• ${lbl} ${v>0?"+":""}${v}`); } }
  return parts.length?parts.join("<br>"):"—";
}

function tierLabel(tier){ if(tier==="grave") return "🔴 Grave"; if(tier==="media") return "🟡 Média"; return "🟢 Leve"; }
function tierTag(tier){ return `<span class="pill mini">${tierLabel(tier)}</span>`; }

function renderChosenDisadvantages(player){
  const ids = player?.character?.disadvantages || [];
  const list = ids.map(id=>getDisadv(id)).filter(Boolean);
  if(!list.length) return `<span class="muted mini">Nenhuma escolhida.</span>`;
  return list.map(d=>{
    const t = d.tier||"leve";
    return `<div class="row" style="justify-content:space-between;gap:8px;align-items:flex-start">
      <div><b style="font-size:12px">${escapeHTML(d.name)}</b><div class="muted mini" style="margin-top:2px">${escapeHTML(d.desc||"")}</div></div>
      <div>${tierTag(t)}</div>
    </div><div class="divider"></div>`;
  }).join("").replace(/<div class="divider"><\/div>\s*$/,"");
}

function renderDisadvTab(playerId){

  for(const d of (DB.disadvantages||[])){ const t=d.tier||"media"; if(groups[t]) groups[t].items.push(d); }

  const renderGroup=(tier)=>{
    const g=groups[tier]; const limit=DISADV_LIMITS[tier]; const used=cts[tier]||0;

      const sel=picked.has(d.id); const lock=!sel&&used>=limit;

}

function finalizeCreation(playerId){
  const p=getPlayer(playerId); if(!p) return;
  if(spentAttrPoints(p)>totalAttrPoints(p)){alert("Atributos acima do limite.");return;}
  if(spentSkillPicks(p)>totalSkillPicks(p)){alert("Perícias acima do limite.");return;}
  const race=getRace(p.character.preferredRaceId)||DB.races?.[0];
  const cls=getClass(p.character.classId)||DB.classes?.[0];
  if(!race||!cls){alert("Escolha raça e classe.");return;}
  if(!p.character.bonusesApplied){applyBonusesToSheet(p,race,cls);p.character.bonusesApplied=true;}
  p.character.finalRaceId=race.id;
  p.characterCreated=true;
  const d0=calcDerived(p);
  p.character.currentStats={vida:d0.vida,defesa:d0.defesa,velocidade:d0.velocidade,mana:d0.mana};
  p.log.unshift({ts:Date.now(),text:`Personagem finalizado — Raça: ${race.name} | Classe: ${cls.name}`});
  saveDB(DB); render(); toast("Personagem finalizado! ⚔️",true);
}

}

document.addEventListener("click",(e)=>{
  const btn=e.target.closest("[data-action]");
  if(!btn) return;
  const action=btn.dataset.action;
  const user=findUserBySession();
  if(!user) return;

  let p=null;
  if(user.role==="player") p=getPlayer(user.playerId);
  else{ const sel=document.getElementById("m_selPlayer"); const pid=(sel&&sel.value)?sel.value:(DB.players[0]?.id||null); if(pid) p=getPlayer(pid); }
  if(!p) return;
  ensureLevelState(p);

  if(action==="lvl_attr_inc"){
    if(!p.characterCreated) return;
    const key=btn.dataset.key; if(!key) return;
    if(Number(p.character.levelAttrBonus||0)<=0) return;
    p.character.levelAttrBonus=Number(p.character.levelAttrBonus||0)-1;
    p.character.attrs[key]=Number(p.character.attrs?.[key]||0)+1;
    saveDB(DB); render(); return;
  }
  if(action==="lvl_skill_inc"){
    if(!p.characterCreated) return;
    const key=btn.dataset.key; if(!key) return;
    if(Number(p.character.levelSkillBonus||0)<=0) return;
    p.character.levelSkillBonus=Number(p.character.levelSkillBonus||0)-1;
    p.character.skills[key]=Number(p.character.skills?.[key]||0)+4;
    saveDB(DB); render(); return;
  }

    applyXpDelta(p,delta,reason);
    toast("XP aplicado!",true); render(); return;
  }
  if(action==="open_tree"){
    if(!p||!p.id) return;
    openSkillTreeModal(p.id); return;
  }
  if(action==="rep_inc"){ p.character.reputacao=clamp((p.character.reputacao||50)+5,0,100); saveDB(DB);render(); return; }
  if(action==="rep_dec"){ p.character.reputacao=clamp((p.character.reputacao||50)-5,0,100); saveDB(DB);render(); return; }
  if(action==="fama_inc"){ p.character.fama=(p.character.fama||0)+1; saveDB(DB);render(); return; }

    const eid=btn.dataset.eid;
    p.character.conditions=(p.character.conditions||[]).filter(x=>x.id!==eid);
    p.character.buffs=(p.character.buffs||[]).filter(x=>x.id!==eid);

  }
  if(action==="inv_add"){
    openItemModal(p.id); return;
  }
  if(action==="rm_item"){
    const iid=btn.dataset.iid;
    p.inventory=(p.inventory||[]).filter(x=>x.id!==iid);

  }

    const item=(p.inventory||[]).find(x=>x.id===iid);

    saveDB(DB); render(); return;
  }

  }

    const eid=btn.dataset.eid;
    p.character.diary=(p.character.diary||[]).filter(x=>x.id!==eid);

  }

    p.character.npcs=(p.character.npcs||[]).filter(x=>x.id!==nid);

document.addEventListener("click",(e)=>{
  const dice=e.target.closest(".diceBtn");
  if(!dice) return;
  const sides=Number(dice.dataset.dice);
  const p=getSessionPlayer();
  if(!p) return;
  const qty=Math.max(1,Math.min(20,Number(document.getElementById("diceQty")?.value||1)));
  const bonus=Number(document.getElementById("diceBonus")?.value||0);

  dice.classList.add("rolling");
  setTimeout(()=>dice.classList.remove("rolling"),400);

  const rolls=[];
  for(let i=0;i<qty;i++) rolls.push(Math.floor(Math.random()*sides)+1);
  const total=rolls.reduce((a,b)=>a+b,0)+bonus;
  const label=`${qty}d${sides}${bonus!==0?(bonus>0?"+"+bonus:bonus):""}`;

  document.getElementById("diceResult").textContent=total;
  document.getElementById("diceResult").style.color=total===qty*sides?"var(--gold)":total===qty?"var(--bad)":"var(--txt)";

  if(!p.character.rollLog) p.character.rollLog=[];
  p.character.rollLog.unshift({label,rolls,bonus,total,max:qty*sides,ts:Date.now()});
  if(p.character.rollLog.length>50) p.character.rollLog=p.character.rollLog.slice(0,50);
  saveDB(DB);

  // update log display
  const logEl=document.getElementById("rollLog");
  if(logEl){
    logEl.innerHTML=p.character.rollLog.slice(0,20).map(r=>`<div class="rollEntry"><span>${escapeHTML(r.label)}</span><span class="rollVal" style="color:${r.total>=r.max?'var(--gold)':r.total<=1?'var(--bad)':'inherit'}">${r.total}</span></div>`).join("");
  }

  if(!_muteSound) playDiceSound(sides, total, qty);
});

function playDiceSound(sides, total, qty){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    const isCrit=total>=sides*qty; const isFumble=total===qty;
    osc.frequency.setValueAtTime(isCrit?800:isFumble?120:300, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(isCrit?1200:isFumble?80:150, ctx.currentTime+0.15);
    osc.type=isCrit?"sine":"triangle";
    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.3);
  }catch(_){}
}

  const html=`
    <div class="overlay" id="ovCond">
      <div class="modal" style="max-width:480px">
        <div class="modalHeader"><b style="font-family:'Cinzel',serif">+ Efeito / Condição</b><button class="danger" id="closeCond">✕</button></div>
        <div class="divider"></div>
        <label>Nome do efeito</label><input id="condName" placeholder="ex: Veneno, Bênção, Lentidão..." style="width:100%;margin-bottom:10px">
        <label>Tipo</label>
        <select id="condType" style="width:100%;margin-bottom:10px">
          <option value="veneno">🟢 Veneno</option>
          <option value="sangramento">🔴 Sangramento</option>
          <option value="medo">🟡 Medo</option>
          <option value="atordoado">⚪ Atordoado</option>
          <option value="paralisado">🔵 Paralisado</option>
          <option value="amaldicoado">🟣 Amaldiçoado</option>
          <option value="buff">✨ Buff</option>
        </select>
        <label>Descrição (opcional)</label><input id="condDesc" placeholder="O que acontece..." style="width:100%;margin-bottom:10px">
        <label>Duração (minutos, 0=permanente)</label><input id="condDur" type="number" value="0" min="0" style="width:100%;margin-bottom:14px">
        <div class="row" style="justify-content:flex-end"><button id="condSave">Adicionar</button></div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML("beforeend",html);
  $("closeCond").onclick=()=>$("ovCond")?.remove();
  $("ovCond").onclick=(e)=>{ if(e.target.id==="ovCond") $("ovCond")?.remove(); };
  $("condSave").onclick=()=>{
    const name=String($("condName").value||"").trim(); if(!name) return;
    const type=$("condType").value;
    const desc=String($("condDesc").value||"").trim();
    const dur=Number($("condDur").value||0);
    const id="eff_"+Math.random().toString(16).slice(2,8);
    const expires=dur>0 ? Date.now()+dur*60*1000 : null;
    const p=getPlayer(playerId); if(!p) return;
    if(type==="buff"){
      if(!p.character.buffs) p.character.buffs=[];
      p.character.buffs.push({id,name,desc,expires});
    } else {
      if(!p.character.conditions) p.character.conditions=[];
      p.character.conditions.push({id,name,type,desc,expires});
    }
    saveDB(DB); $("ovCond")?.remove(); render();
    toast(`Efeito "${name}" adicionado!`,true);
  };
}

/* ========================= SKILL TREE ========================= */
function ensureSkillTree(player){
  if(!player.character) player.character={};
  if(!player.character.skillTree||typeof player.character.skillTree!=="object") player.character.skillTree={nodes:[],links:[]};
  if(!Array.isArray(player.character.skillTree.nodes)) player.character.skillTree.nodes=[];
  if(!Array.isArray(player.character.skillTree.links)) player.character.skillTree.links=[];
  return player.character.skillTree;
}

  if(document.getElementById("stStyles")) return;
  const st=document.createElement("style");
  st.id="stStyles";
  st.textContent=`
    .stWrap{display:grid;grid-template-columns:1fr 320px;gap:12px}
    @media(max-width:900px){.stWrap{grid-template-columns:1fr}}
    .stToolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .stBoard{position:relative;height:64vh;min-height:420px;border:1px solid var(--line);border-radius:18px;background:#0c131c;overflow:hidden}
    .stSvg{position:absolute;inset:0;pointer-events:none}
    .stNode{position:absolute;min-width:170px;max-width:220px;border:1px solid var(--line);border-radius:16px;padding:10px;background:rgba(18,26,36,.96);backdrop-filter:blur(10px);box-shadow:0 10px 30px rgba(0,0,0,.25);cursor:grab;user-select:none}
    .stNode:active{cursor:grabbing}
    .stNode b{display:block;font-size:13px}
    .stNode .mini{font-size:12px;color:var(--muted);line-height:1.2}
    .stNode.sel{outline:2px solid rgba(43,108,255,.65);box-shadow:0 0 0 6px rgba(43,108,255,.12)}
    .stPill{display:inline-flex;gap:6px;align-items:center;padding:3px 8px;border-radius:999px;border:1px solid var(--line);background:#0b121a;color:var(--muted);font-size:12px}
    .stSide .card{background:#0c131c}
    .stSide input,.stSide textarea,.stSide select{width:100%}
  `;
  document.head.appendChild(st);
}

function openSkillTreeModal(playerId){
  injectSkillTreeStyles();
  DB=loadDB();
  const p=getPlayer(playerId); if(!p) return;
  const tree=ensureSkillTree(p);
  const state={mode:"move",selectedId:null,linkFrom:null};

  const html=`
    <div class="overlay" id="ovSkillTree">
      <div class="modal">
        <div class="modalHeader">
          <div>
            <div style="font-size:16px;font-weight:900;font-family:'Cinzel',serif">🌿 Árvore de Skills — ${escapeHTML(p.character.charName||p.username)}</div>
            <div class="muted mini">Modo <b id="stModeLabel">MOVER</b> • arraste nós, crie pré-requisitos.</div>
          </div>
          <div class="row">
            <button class="secondary" id="stExport">Exportar JSON</button>
            <button class="secondary" id="stImport">Importar JSON</button>
            <button class="danger" id="stClose">Fechar</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="stToolbar">
          <button id="stAdd">+ Nova skill</button>
          <button class="secondary" id="stMode">Alternar: mover/link</button>
          <span class="pill">Nós: <b id="stCount">0</b> • Links: <b id="stLinkCount">0</b></span>
          <span class="muted mini" id="stHint"></span>
        </div>
        <div class="divider"></div>
        <div class="stWrap">
          <div class="stBoard" id="stBoard">
            <svg class="stSvg" id="stSvg"></svg>
            <div id="stNodes"></div>
          </div>
          <div class="stSide" id="stSide">
            <div class="card">
              <b style="font-family:'Cinzel',serif">Editor</b><div class="divider"></div>
              <div class="muted mini" id="stEmpty">Clique numa skill para editar.</div>
              <div id="stForm" class="hidden">
                <label class="mini">Nome</label><input id="stName" placeholder="Ex: Corte do Véu">
                <div class="row" style="margin-top:10px">
                  <div style="flex:1;min-width:100px"><label class="mini">Nível</label><input id="stLevel" type="number" min="1" value="1"></div>
                  <div style="flex:1;min-width:100px"><label class="mini">Mana</label><input id="stMana" type="number" min="0" value="5"></div>
                </div>
                <div class="row" style="margin-top:10px">
                  <div style="flex:1"><label class="mini">Tipo</label><select id="stType"><option value="ativa">Ativa</option><option value="passiva">Passiva</option><option value="reacao">Reação</option></select></div>
                  <div style="flex:1"><label class="mini">Status</label><select id="stState"><option value="bloqueada">Bloqueada</option><option value="liberada">Liberada</option><option value="comprada">Comprada</option></select></div>
                </div>
                <div style="margin-top:10px"><label class="mini">Descrição</label><textarea id="stDesc" placeholder="Efeito curto e claro..."></textarea></div>
                <div class="row" style="margin-top:10px">
                  <button class="secondary" id="stDel">Remover</button>
                  <button id="stSave">Salvar</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML("beforeend",html);

  const close=()=>{ document.getElementById("ovSkillTree")?.remove(); saveDB(DB); };
  $("stClose").onclick=close;
  $("ovSkillTree").addEventListener("click",(e)=>{ if(e.target.id==="ovSkillTree") close(); });

  const board=$("stBoard"), svg=$("stSvg"), nodesWrap=$("stNodes");

  function persist(){ const p2=getPlayer(playerId); if(!p2) return; ensureSkillTree(p2).nodes=tree.nodes; ensureSkillTree(p2).links=tree.links; saveDB(DB); }
  function updateCounters(){ $("stCount").textContent=String(tree.nodes.length); $("stLinkCount").textContent=String(tree.links.length); }
  function setMode(next){ state.mode=next; $("stModeLabel").textContent=next==="move"?"MOVER":"LINK"; $("stHint").textContent=next==="move"?"Arraste as skills para organizar.":"Clique na A e depois na B para criar pré-requisito."; state.linkFrom=null; }

  function nodeCenter(n){ const el=nodesWrap.querySelector(`[data-node="${n.id}"]`); const w=el?el.offsetWidth:180; const h=el?el.offsetHeight:90; return{x:n.x+w/2,y:n.y+h/2}; }
  function drawLinks(){ const bb=board.getBoundingClientRect(); svg.setAttribute("viewBox",`0 0 ${bb.width} ${bb.height}`); svg.setAttribute("width",bb.width); svg.setAttribute("height",bb.height); const lines=[]; for(const lk of tree.links){ const a=tree.nodes.find(x=>x.id===lk.from); const b=tree.nodes.find(x=>x.id===lk.to); if(!a||!b) continue; const p1=nodeCenter(a); const p2=nodeCenter(b); lines.push(`<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="rgba(43,108,255,.75)" stroke-width="3"/>`); lines.push(`<circle cx="${p2.x}" cy="${p2.y}" r="5" fill="rgba(43,108,255,.85)"/>`); } svg.innerHTML=lines.join(""); }
  function renderNodes(){ nodesWrap.innerHTML=tree.nodes.map(n=>{ const sel=n.id===state.selectedId?"sel":""; return `<div class="stNode ${sel}" data-node="${n.id}" style="left:${n.x}px;top:${n.y}px"><b>${escapeHTML(n.name||"Nova Skill")}</b><div class="mini">${escapeHTML(n.desc||"")}</div><div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap"><span class="stPill">Lvl ${n.level||1}</span><span class="stPill">${n.mana||0} Mana</span><span class="stPill">${escapeHTML(n.type||"ativa")}</span><span class="stPill">${escapeHTML(n.state||"bloqueada")}</span></div></div>`; }).join(""); updateCounters(); drawLinks(); }

  function openEditor(n){ state.selectedId=n?.id||null; const empty=$("stEmpty"); const form=$("stForm"); if(!n){empty.classList.remove("hidden");form.classList.add("hidden");renderNodes();return;} empty.classList.add("hidden");form.classList.remove("hidden"); $("stName").value=n.name||""; $("stLevel").value=n.level||1; $("stMana").value=n.mana||0; $("stType").value=n.type||"ativa"; $("stState").value=n.state||"bloqueada"; $("stDesc").value=n.desc||""; renderNodes(); }

  $("stAdd").onclick=()=>{ const bb=board.getBoundingClientRect(); const node={id:"sk_"+Math.random().toString(16).slice(2,8),x:Math.max(12,Math.round(bb.width*0.12)),y:Math.max(12,Math.round(bb.height*0.12)),name:"Nova Skill",desc:"Descreva o efeito...",level:1,mana:5,type:"ativa",state:"bloqueada"}; tree.nodes.push(node); persist(); openEditor(node); };
  $("stMode").onclick=()=>setMode(state.mode==="move"?"link":"move");
  $("stExport").onclick=()=>{ const json=JSON.stringify(tree,null,2); navigator.clipboard?.writeText(json).then(()=>toast("JSON copiado!",true)).catch(()=>prompt("Copie o JSON:",json)); };
  $("stImport").onclick=()=>{ const raw=prompt("Cole o JSON da árvore:"); if(!raw) return; try{const obj=JSON.parse(raw); if(!Array.isArray(obj.nodes)||!Array.isArray(obj.links)) throw new Error(); tree.nodes=obj.nodes; tree.links=obj.links; persist(); openEditor(null); renderNodes(); toast("Árvore importada!",true);}catch{toast("JSON inválido.",false);} };
  $("stSave").onclick=()=>{ const n=tree.nodes.find(x=>x.id===state.selectedId); if(!n) return; n.name=String($("stName").value||"").trim()||"Skill"; n.level=Math.max(1,Number($("stLevel").value||1)); n.mana=Math.max(0,Number($("stMana").value||0)); n.type=$("stType").value; n.state=$("stState").value; n.desc=String($("stDesc").value||"").trim(); persist(); renderNodes(); toast("Skill salva.",true); };
  $("stDel").onclick=()=>{ const id=state.selectedId; if(!id) return; if(!confirm("Remover essa skill?")) return; tree.nodes=tree.nodes.filter(x=>x.id!==id); tree.links=tree.links.filter(l=>l.from!==id&&l.to!==id); state.selectedId=null; state.linkFrom=null; persist(); openEditor(null); renderNodes(); toast("Skill removida.",true); };

  let drag=null;
  nodesWrap.addEventListener("mousedown",(e)=>{ const el=e.target.closest&&e.target.closest(".stNode"); if(!el) return; const id=el.dataset.node; const n=tree.nodes.find(x=>x.id===id); if(!n) return; if(state.mode==="link"){ if(!state.linkFrom){state.linkFrom=id;state.selectedId=id;renderNodes();toast("Escolha a skill de DESTINO.",true);}else{const from=state.linkFrom;const to=id;if(from===to){state.linkFrom=null;toast("Cancelado.",false);return;}const exists=tree.links.some(l=>l.from===from&&l.to===to);if(!exists)tree.links.push({from,to});state.linkFrom=null;persist();renderNodes();toast("Pré-requisito criado.",true);} openEditor(n); return; } state.selectedId=id; openEditor(n); const rect=board.getBoundingClientRect(); drag={id,startX:e.clientX,startY:e.clientY,nodeX:n.x,nodeY:n.y,rectW:rect.width,rectH:rect.height}; e.preventDefault(); });
  window.addEventListener("mousemove",(e)=>{ if(!drag||state.mode!=="move") return; const n=tree.nodes.find(x=>x.id===drag.id); if(!n) return; n.x=clamp(drag.nodeX+(e.clientX-drag.startX),8,drag.rectW-240); n.y=clamp(drag.nodeY+(e.clientY-drag.startY),8,drag.rectH-120); renderNodes(); });
  window.addEventListener("mouseup",()=>{ if(!drag) return; persist(); drag=null; });

  setMode("move"); openEditor(null); renderNodes();
}

(function initBook(){
  const overlay = document.getElementById("bookOverlay");
  const cover = document.getElementById("bookCover");
  const btn = document.getElementById("bookOpenBtn");
  if(!overlay || !cover || !btn) return;

  // Se já logado, pula a animação
  const db = loadDB();
  if(db && db.session && db.session.userId){
    overlay.style.display = "none";
    return;
  }

  btn.onclick = function(){
    cover.classList.add("opening");
    setTimeout(()=>{
      overlay.style.transition = "opacity .5s ease";
      overlay.style.opacity = "0";
      setTimeout(()=>{
        overlay.style.display = "none";
        // Fade in the main content
        const main = document.querySelector("main");
        if(main){ main.classList.add("appFadeIn"); setTimeout(()=>main.classList.remove("appFadeIn"),900); }
      }, 500);
    }, 900);
  };

  // Enter no password também fecha o livro se tiver aberto
  const passInput = document.getElementById("loginPass");
  if(passInput){
    const origKeydown = passInput.onkeydown;
    passInput.addEventListener("keydown", e=>{
      if(e.key==="Enter" && overlay.style.display !== "none"){
        btn.click();
        setTimeout(()=>document.getElementById("btnLogin").click(), 1500);
      }
    });
  }
})();

    appId: "1:391790281343:web:87d74cbe149a415036354a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // 🔥 só inicia depois que TUDO carregou
  window.addEventListener("load", () => {

    console.log("Firebase iniciado com segurança");

    // ouvir atualizações
    let lastUpdate = 0;

    onValue(ref(db, "myr/globalState"), (snapshot) => {
      const data = snapshot.val();

      if(data && data.updatedAt > lastUpdate){
        lastUpdate = data.updatedAt;

        if(window.loadGameState){
          window.loadGameState(data);
        }
      }
    });

    // função global segura
    window.saveToCloud = function(data){
      set(ref(db, "myr/globalState"), {
        ...data,
        updatedAt: Date.now()
      });
    };

  });
</script>
</body>
</html>
